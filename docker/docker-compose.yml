# =============================================================================
# ZezCloud Zero — Docker Compose Stack
# Variables are injected by Terraform user-data or local .env file.
# =============================================================================

services:

  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zezcloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${db_name}
      POSTGRES_USER: ${db_user}
      POSTGRES_PASSWORD: ${db_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${db_user} -d ${db_name}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Spring Boot API ─────────────────────────────────────────────────────────
  api:
    image: ghcr.io/zezoca29/zezcloud-api:latest
    container_name: zezcloud-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${spring_profile}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${db_name}
      SPRING_DATASOURCE_USERNAME: ${db_user}
      SPRING_DATASOURCE_PASSWORD: ${db_password}
      SERVER_PORT: 8080
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: ghcr.io/zezoca29/zezcloud-nginx:latest
    container_name: zezcloud-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─── Networks ─────────────────────────────────────────────────────────────────

networks:
  backend:
    driver: bridge
    internal: true          # No direct internet access from backend
  frontend:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
